{% extends 'base.html' %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h2>Data Dokter Hewan</h2>
    <a href="{% url 'peternakan:dokter_tambah' %}" class="btn btn-primary"><i class="bi bi-plus-lg"></i> Tambah Dokter</a>
</div>

<div class="card p-3">
    <table class="table table-hover table-sm">
        <thead class="table-light">
            <tr>
                <th>Nama Dokter</th>
                <th>No. Telepon</th>
                <th>Spesialisasi</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody>
            {% for d in data %}
            <tr>
                <td>{{ d.nama }}</td>
                <td>{{ d.no_telepon }}</td>
                <td>{{ d.spesialisasi|default:"-" }}</td>
                <td>
                    <a href="{% url 'peternakan:dokter_edit' d.pk %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'peternakan:dokter_hapus' d.pk %}" class="btn btn-sm btn-danger">Hapus</a>
                </td>
            </tr>
            {% empty %}
            <tr><td colspan="4" class="text-center text-muted">Belum ada data dokter.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
