{% extends 'base.html' %}
{% block content %}
<h2 class="mb-4">Input Pemeliharaan Pakan</h2>
<div class="card p-4 col-md-8">
    <form method="post">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold small">Pilih Sapi</label>
                {{ form.sapi }}
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold small">Tanggal</label>
                {{ form.tanggal }}
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold small">Jenis Pakan / Pemeliharaan</label>
                {{ form.jenis_pakan }}
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold small">Jumlah Pakan (Kg)</label>
                {{ form.jumlah_pakan }}
            </div>
            <div class="col-md-6 mb-3">
                <label class="form-label fw-bold small">Total Biaya Pakan (Rp)</label>
                {{ form.biaya_pakan }}
            </div>
            <div class="col-md-12 mb-3">
                <label class="form-label fw-bold small">Keterangan</label>
                {{ form.keterangan }}
            </div>
        </div>
        <button type="submit" class="btn btn-success">Simpan</button>
        <a href="{% url 'peternakan:pemeliharaan_list' %}" class="btn btn-secondary">Batal</a>
    </form>
</div>
{% endblock %}
