{% extends 'base.html' %}
{% block content %}
<div class="card p-4 col-md-6 mt-5 mx-auto shadow">
    <h4 class="text-danger mb-3"><i class="bi bi-exclamation-triangle"></i> Konfirmasi Hapus</h4>
    <p>Hapus data pakan untuk sapi <strong>{{ object.sapi.nama_sapi }}</strong> tanggal <strong>{{ object.tanggal|date:"d M Y" }}</strong>?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Ya, Hapus!</button>
        <a href="{% url 'peternakan:pemeliharaan_list' %}" class="btn btn-secondary">Batal</a>
    </form>
</div>
{% endblock %}
