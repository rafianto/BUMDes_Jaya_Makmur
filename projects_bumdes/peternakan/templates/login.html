<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BUMDes Jaya Makmur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { max-width: 400px; width: 100%; border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="card login-card p-4">
        <div class="text-center mb-4">
             <img src="/media/images/logo.jpeg" class="img-fluid rounded mb-3" style="max-height: 120px; object-fit:cover;">
             </i> BUMDes JAYA MAKMUR</h>
            <p class="text-muted">Silakan login untuk mengakses sistem</p>
        </div>

        <!-- Menampilkan pesan error jika salah password -->
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger py-2 small">{{ message }}</div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label fw-bold">Username</label>
                <input type="text" name="username" class="form-control form-control-lg" placeholder="Masukkan username" required autofocus>
            </div>
            <div class="mb-4">
                <label class="form-label fw-bold">Password</label>
                <input type="password" name="password" class="form-control form-control-lg" placeholder="Masukkan password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg w-100">LOGIN</button>
        </div>
    </div>
</body>
</html>
